<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Fun Website</title>

    <!-- Bootstrap (optional but nice) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="text-center p-5">

<h1>Welcome to My Website 🎉</h1>
<p>This is my first GitHub Pages site!</p>

<button class="btn btn-primary" onclick="sayHello()">Click Me</button>


<div id="mapContainer" style="position: relative; display: inline-block;">
    <img id="worldMap" src="images/worldmap.jpg" alt="World Map" style="max-width: 800px; width: 100%;">
    <div id="marker" style="
        position: absolute;
        width: 14px;
        height: 14px;
        background: red;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        display: none;
    "></div>
</div>

<p id="coordinates">Click the map to choose a location.</p>




<input
        type="range"
        id="yearSlider"
        min="1850"
        max="2025"
        value="1938"
        step="1"
        data-correct-year="2001"
>
<div id="yearDisplay">1960</div>

<button id="submitBtn">Submit</button>
<p id="result"></p>

<script src="script.js"></script>

</body>
</html>
