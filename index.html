<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Offbrand Time Guesser</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
</head>
<body class="text-center p-5">

<h1>April 14th in History</h1>
<h2>Round 1</h2>
<br>
<br>

<img id="image1" src="images/image1.jpg" alt="Image1" style="max-width: 800px; width: 100%;">

<br>

<h3>Choose the Year:</h3>

<input
        type="range"
        id="yearSlider"
        min="1850"
        max="2025"
        value="1938"
        step="1"
        data-correct-year="2001"
>
<div id="yearDisplay">1938</div>

<br>
<br>

<h3>Choose the Location:</h3>
<p id="coordinates">Click the map to choose a location.</p>

<div id="mapContainer" style="position: relative; display: inline-block;">
    <img id="worldMap" src="images/worldmap.jpg" alt="World Map" style="max-width: 800px; width: 100%;" data-correct-x="62.4"
         data-correct-y="41.8">
    <div id="marker" style="
        position: absolute;
        width: 14px;
        height: 14px;
        background: red;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        display: none;
    "></div>
</div>

<br>

<button id="submitBtn" disabled>Submit</button>
<p id="result"></p>


<div class="modal fade" id="scoreModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Your Score</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p id="yearScoreText"></p>
                <p id="locationScoreText"></p>
                <hr>
                <h4 id="totalScoreText"></h4>
            </div>
            <div class="modal-footer">
                <a href="question2.html" class="btn btn-primary">Next Question</a>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>




</body>
</html>
